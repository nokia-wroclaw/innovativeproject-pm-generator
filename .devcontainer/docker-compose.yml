services:
  # Update this to the name of the service you want to work with in your docker-compose.yml file
  spark-jupyter:
    container_name: $USER-devcontainer-genpm-spark
    env_file:
      - ../.env
    build:
      context: ..
      dockerfile: build/Spark.Dockerfile
      args:
        - USER_UID=${USER_UID:-1000}
        - USER_GID=${USER_GID:-1000}
        - USERNAME=sparkuser
        - SPARK_GROUP=sparkgroup
        - SPARK_GROUP_GID=1005
    volumes:
      - ..:/home/sparkuser/app:cached
    deploy:
      resources:
        reservations:
          cpus: '0.18'
          memory: '20G'
    command: sleep infinity
