services:
  frontend:
    image: node:22-alpine
    container_name: $USER-genpm-frontend
    working_dir: /app
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ../apps/frontend:/app
      - ../shared:/app/shared:ro
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:${FASTAPI_PORT:-8000}
      VITE_KEYCLOAK_URL: http://localhost:${KEYCLOAK_PORT:-8080}
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      VITE_KEYCLOAK_ADMIN_ROLE: ${KEYCLOAK_ADMIN_ROLE:-admin}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - fastapi
      - keycloak

  spark-jupyter:
    image: genpm/spark-jupyter:latest
    container_name: $USER-genpm-spark
    hostname: $USER-spark-jupyter
    build:
      context: ..
      dockerfile: build/Spark.Dockerfile
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
        USERNAME: ${USER:-hostuser}
    ports:
      - "${JUPYTER_PORT}:4041"
      - "${SPARK_MASTER_PORT}:18080"
      - "${SPARK_UI_PORT}:4040"
      - "${SPARK_MASTER}:7077"
    volumes:
      - ../apps/generator:/home/${USER:-hostuser}/app/apps/generator
      - ../shared:/app/shared:ro
      - /home/shared_dir:/home/${USER:-hostuser}/app/apps/generator/data/shared_dir
      - ../apps/generator/apps:/opt/airflow/spark-apps
    env_file:
      - ../.env
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_ENDPOINT=${S3_URL}
      - GENPM_SCHEMA_PATH=/app/shared/pm_schema_columns.json
    networks:
      default:
      shared-network:
        aliases:
          - ${USER}-spark-jupyter
    deploy:
      resources:
        reservations:
          cpus: '0.18'
          memory: '20G'
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  fastapi:
    image: genpm/fastapi:latest
    container_name: $USER-genpm-app
    build:
      context: ..
      dockerfile: build/FastAPI.Dockerfile
    ports:
      - "${FASTAPI_PORT}:8000"
    volumes:
      - ../apps/backend/app:/app/app
      - ../shared:/app/shared:ro
    env_file:
      - ../.env
    environment:
      GENPM_SCHEMA_PATH: /app/shared/pm_schema_columns.json
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW_URL: ${AIRFLOW_URL}
      AIRFLOW_API_PREFIX: ${AIRFLOW_API_PREFIX:-/api/v2}
      AIRFLOW_AUTH_TOKEN_PATH: ${AIRFLOW_AUTH_TOKEN_PATH:-/auth/token}
      AIRFLOW_USERNAME: ${AIRFLOW_USERNAME:-airflow}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
      AIRFLOW_HTTP_TIMEOUT_SECONDS: ${AIRFLOW_HTTP_TIMEOUT_SECONDS:-15}
      LOG_STREAM_MAX_DURATION_SECONDS: ${LOG_STREAM_MAX_DURATION_SECONDS:-7200}
      LOG_STREAM_HEARTBEAT_SECONDS: ${LOG_STREAM_HEARTBEAT_SECONDS:-15}
      DAG_LIST_CACHE_SECONDS: ${DAG_LIST_CACHE_SECONDS:-30}
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL}
      KEYCLOAK_ISSUER_URL: http://localhost:${KEYCLOAK_PORT:-8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_REQUIRED_ROLES: ${KEYCLOAK_REQUIRED_ROLES}
      KEYCLOAK_ADMIN_ROLE: ${KEYCLOAK_ADMIN_ROLE:-admin}
      FRONTEND_ORIGIN: http://localhost:${FRONTEND_PORT:-5173}
      S3_URL: ${S3_URL}
      S3_EXTERNAL_URL: ${S3_EXTERNAL_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    networks:
      - default
      - shared-network
    depends_on:
      - postgres
      - keycloak

  postgres:
    image: postgres:16-alpine
    container_name: $USER-genpm-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: quay.io/minio/minio:latest
    container_name: $USER-genpm-s3
    ports:
      - "${S3_API_PORT}:9000"
      - "${S3_WEBCONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    command: server /data --console-address ":9001"
    networks:
      default:
      shared-network:
        aliases:
          - minio
    volumes:
      - /${S3_DIRECTORY}/data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    container_name: $USER-genpm-keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT}:8080"
    command: start-dev --import-realm
    volumes:
      - ../infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak_data:/opt/keycloak/data
volumes:
  frontend_node_modules:
  postgres_data:
  keycloak_data:

networks:
  shared-network:
    external: true
