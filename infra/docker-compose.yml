services:
  spark-jupyter:
    image: genpm/spark-jupyter:latest
    container_name: $USER-genpm-spark
    build:
      context: ..
      dockerfile: build/Spark.Dockerfile
    ports:
      - "${JUPYTER_PORT}:4041"
      - "${SPARK_MASTER_PORT}:18080"
      - "${SPARK_UI_PORT}:4040"
    volumes:
      - ../apps/generator:/home/sparkuser/app/apps/generator
      - /home/shared_dir:/home/sparkuser/app/apps/generator/data/shared_dir
    env_file:
      - ../.env
    deploy:
      resources:
        reservations:
          cpus: '0.18'
          memory: '20G'

  fastapi:
    image: genpm/fastapi:latest
    container_name: $USER-genpm-app
    build:
      context: ..
      dockerfile: build/FastAPI.Dockerfile
    ports:
      - "${FASTAPI_PORT}:8000"
    volumes:
      - ../apps/backend/app:/app/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    networks:
      - default
      - shared-network
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: $USER-genpm-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: quay.io/minio/minio:latest
    container_name: $USER-genpm-s3
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_WEBCONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - /${MINIO_DIRECTORY}/data:/data

volumes:
  postgres_data:

networks:
  shared-network:
    external: true