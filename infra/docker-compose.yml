services:
  frontend:
    image: node:22-alpine
    container_name: $USER-genpm-frontend
    working_dir: /app
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ../apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:${FASTAPI_PORT:-8000}
      VITE_KEYCLOAK_URL: http://localhost:${KEYCLOAK_PORT:-8080}
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - fastapi
      - keycloak

  spark-jupyter:
    image: genpm/spark-jupyter:latest
    container_name: $USER-genpm-spark
    build:
      context: ..
      dockerfile: build/Spark.Dockerfile
    ports:
      - "${JUPYTER_PORT}:4041"
      - "${SPARK_MASTER_PORT}:18080"
      - "${SPARK_UI_PORT}:4040"
    volumes:
      - ../apps/generator:/home/sparkuser/app/apps/generator
      - /home/shared_dir:/home/sparkuser/app/apps/generator/data/shared_dir
    env_file:
      - ../.env
    deploy:
      resources:
        reservations:
          cpus: '0.18'
          memory: '20G'

  fastapi:
    image: genpm/fastapi:latest
    container_name: $USER-genpm-app
    build:
      context: ..
      dockerfile: build/FastAPI.Dockerfile
    ports:
      - "${FASTAPI_PORT}:8000"
    volumes:
      - ../apps/backend/app:/app/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL}
      KEYCLOAK_ISSUER_URL: http://localhost:${KEYCLOAK_PORT:-8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_REQUIRED_ROLES: ${KEYCLOAK_REQUIRED_ROLES}
      FRONTEND_ORIGIN: http://localhost:${FRONTEND_PORT:-5173}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    depends_on:
      - postgres
      - keycloak

  postgres:
    image: postgres:16-alpine
    container_name: $USER-genpm-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: quay.io/minio/minio:latest
    container_name: $USER-genpm-s3
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_WEBCONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - /${MINIO_DIRECTORY}/data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    container_name: $USER-genpm-keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT}:8080"
    command: start-dev --import-realm
    volumes:
      - ../infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak_data:/opt/keycloak/data
volumes:
  frontend_node_modules:
  postgres_data:
  keycloak_data:
